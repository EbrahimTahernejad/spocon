name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Lint + tests on x86_64 glibc — fast feedback for every push.
  # ---------------------------------------------------------------------------
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  # ---------------------------------------------------------------------------
  # Confirm the static-musl release builds still work on every push.
  # Same matrix as the release workflow so a green CI implies a shippable
  # build.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            apt:    musl-tools
            cc:     musl-gcc
          - target: aarch64-unknown-linux-musl
            apt:    gcc-aarch64-linux-gnu
            cc:     aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The aarch64 musl cross toolchain comes from Ubuntu's apt, not
      # musl.cc — that mirror frequently times out from GitHub-hosted
      # runners. rustc supplies the musl crt + libc.a from rust-std, so
      # an `-linux-gnu-` linker is fine for producing a static binary
      # (works with `panic = "abort"` which removes the libgcc unwind
      # dependency).
      - name: install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: build static release binaries
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.cc }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.cc }}
          CC_x86_64_unknown_linux_musl: ${{ matrix.cc }}
          CC_aarch64_unknown_linux_musl: ${{ matrix.cc }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          file target/${{ matrix.target }}/release/spocon-server
          file target/${{ matrix.target }}/release/spocon-client

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spocon-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/spocon-server
            target/${{ matrix.target }}/release/spocon-client
          retention-days: 14
