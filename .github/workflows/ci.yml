name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Lint + tests on x86_64 glibc — fast feedback for every push.
  # ---------------------------------------------------------------------------
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  # ---------------------------------------------------------------------------
  # Confirm the static-musl release builds still work on every push.
  # Same matrix as the release workflow so a green CI implies a shippable
  # build.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            cc:     musl-gcc
          - target: aarch64-unknown-linux-musl
            cc:     aarch64-linux-musl-gcc

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install x86_64 musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: install aarch64 musl cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -fsSL https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar -xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"

      - name: build static release binaries
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.cc }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.cc }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          file  target/${{ matrix.target }}/release/spocon-server
          file  target/${{ matrix.target }}/release/spocon-client

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spocon-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/spocon-server
            target/${{ matrix.target }}/release/spocon-client
          retention-days: 14
